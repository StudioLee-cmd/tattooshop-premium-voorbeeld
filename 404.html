  <div class="mobile-menu"><div class="mobile-menu-backdrop"></div><div class="mobile-menu-panel"><nav class="mobile-menu-nav"><a href="index.html">Home</a><a href="work.html">Portfolio</a><a href="blog.html">Blog</a><a href="about.html">Over Ons</a><a href="contact.html">Contact</a></nav></div></div>
  <div class="page-404"><h1>404</h1><p>Oeps! Deze pagina is verdwenen als inkt in de huid. Maar geen zorgen, hier is een spelletje!</p><div class="game-info"><span>Score: <span class="accent" id="score">0</span></span><span>Levens: <span class="accent" id="lives">3</span></span></div><canvas id="gameCanvas" class="game-canvas" width="600" height="450"></canvas><p style="font-size:0.875rem;opacity:0.5;margin-bottom:var(--sp-4)">Gebruik je muis of vinger om de paddle te bewegen.</p><a href="index.html" class="back-home-btn">&larr; Terug naar home</a></div>
  <script>(function(){const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');const scoreEl=document.getElementById('score');const livesEl=document.getElementById('lives');function resizeCanvas(){const maxW=Math.min(600,window.innerWidth-40);canvas.style.width=maxW+'px';canvas.style.height=(maxW/1.333)+'px'}resizeCanvas();window.addEventListener('resize',resizeCanvas);const C={bg:'#2A2A2B',text:'#E1E1C2',primary:'#FF532C',accent:'#0091CF',dim:'rgba(225,225,194,0.3)'};let score=0,lives=3,running=true,won=false;const ball={x:300,y:400,dx:4,dy:-4,r:8,spd:5};const pad={w:90,h:14,x:255,y:430};const bc={rows:5,cols:8,w:62,h:20,p:8,top:50,left:19};const bColors=[C.primary,C.primary,C.accent,C.accent,C.text];let bricks=[];function initB(){bricks=[];for(let r=0;r<bc.rows;r++){bricks[r]=[];for(let c=0;c<bc.cols;c++)bricks[r][c]={x:bc.left+c*(bc.w+bc.p),y:bc.top+r*(bc.h+bc.p),alive:true,color:bColors[r]}}}initB();let mx=pad.x+pad.w/2;canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mx=(e.clientX-r.left)*(600/r.width)});canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();mx=(e.touches[0].clientX-r.left)*(600/r.width)},{passive:false});canvas.addEventListener('click',()=>{if(!running){score=0;lives=3;running=true;won=false;ball.x=300;ball.y=400;ball.dx=4;ball.dy=-4;initB();scoreEl.textContent=score;livesEl.textContent=lives}});function loop(){ctx.clearRect(0,0,600,450);ctx.fillStyle=C.bg;ctx.fillRect(0,0,600,450);if(!running){for(let r=0;r<bc.rows;r++)for(let c=0;c<bc.cols;c++){const b=bricks[r][c];if(b.alive){ctx.beginPath();ctx.roundRect(b.x,b.y,bc.w,bc.h,3);ctx.fillStyle=b.color;ctx.fill()}}ctx.beginPath();ctx.roundRect(pad.x,pad.y,pad.w,pad.h,4);ctx.fillStyle=C.text;ctx.fill();ctx.fillStyle=C.text;ctx.font='900 48px "Barlow Condensed",sans-serif';ctx.textAlign='center';ctx.fillText(won?'GEWONNEN!':'GAME OVER',300,210);ctx.font='500 16px "Inter",sans-serif';ctx.fillStyle=C.dim;ctx.fillText('Klik om opnieuw te spelen',300,245);requestAnimationFrame(loop);return}pad.x=Math.max(0,Math.min(510,mx-45));ball.x+=ball.dx;ball.y+=ball.dy;if(ball.x+8>600||ball.x-8<0)ball.dx=-ball.dx;if(ball.y-8<0)ball.dy=-ball.dy;if(ball.y+8>pad.y&&ball.y+8<pad.y+19&&ball.x>pad.x&&ball.x<pad.x+90){const h=(ball.x-pad.x)/90;const a=(h-.5)*Math.PI*.7;ball.dx=ball.spd*Math.sin(a);ball.dy=-ball.spd*Math.cos(a)}if(ball.y+8>450){lives--;livesEl.textContent=lives;if(lives<=0)running=false;else{ball.x=pad.x+45;ball.y=410;ball.dx=4*(Math.random()>.5?1:-1);ball.dy=-4}}for(let r=0;r<bc.rows;r++)for(let c=0;c<bc.cols;c++){const b=bricks[r][c];if(!b.alive)continue;if(ball.x>b.x&&ball.x<b.x+bc.w&&ball.y>b.y&&ball.y<b.y+bc.h){ball.dy=-ball.dy;b.alive=false;score+=10;scoreEl.textContent=score;if(score/10>=40){won=true;running=false}}}for(let r=0;r<bc.rows;r++)for(let c=0;c<bc.cols;c++){const b=bricks[r][c];if(b.alive){ctx.beginPath();ctx.roundRect(b.x,b.y,bc.w,bc.h,3);ctx.fillStyle=b.color;ctx.fill()}}ctx.beginPath();ctx.arc(ball.x,ball.y,8,0,Math.PI*2);ctx.fillStyle=C.text;ctx.fill();ctx.beginPath();ctx.roundRect(pad.x,pad.y,pad.w,pad.h,4);ctx.fillStyle=C.text;ctx.fill();ctx.font='900 14px "Barlow Condensed",sans-serif';ctx.fillStyle=C.dim;ctx.textAlign='left';ctx.fillText('SCORE: '+score,10,25);ctx.textAlign='right';ctx.fillText('LEVENS: '+lives,590,25);requestAnimationFrame(loop)}loop();const btn=document.querySelector('.menu-btn'),menu=document.querySelector('.mobile-menu');if(btn&&menu){btn.addEventListener('click',()=>{menu.classList.toggle('is-open');btn.classList.toggle('is-open')});const bd=menu.querySelector('.mobile-menu-backdrop');if(bd)bd.addEventListener('click',()=>{menu.classList.remove('is-open');btn.classList.remove('is-open')});menu.querySelectorAll('a').forEach(l=>l.addEventListener('click',()=>{menu.classList.remove('is-open');btn.classList.remove('is-open')}))}})();</script>
</body>
